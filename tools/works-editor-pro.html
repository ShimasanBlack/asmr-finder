<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>works.json エディター Pro</title>
<style>
/* ================================================================
   RESET & CSS VARIABLES
================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0c0e14;
  --surface:   #161922;
  --surface2:  #1e2230;
  --surface3:  #252a3a;
  --border:    rgba(110,130,190,0.14);
  --border2:   rgba(110,130,190,0.28);
  --accent:    #4f8ef7;
  --accent-d:  #3a6fd4;
  --green:     #34c98a;
  --red:       #e8485a;
  --amber:     #c9a96e;
  --text:      #dde4f0;
  --text2:     #8896b0;
  --muted:     #525c72;
  --r:         6px;
  --hdr:       42px;   /* ヘッダー高さ */
}

html, body {
  height: 100%;
  overflow: hidden; /* ① 各カラム独立スクロール：body自体はスクロールしない */
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
  font-size: 13px;
  line-height: 1.5;
  user-select: none; /* テキスト選択を無効化（テキスト入力内はJS側で許可） */
}

/* テキスト入力内は選択可能に */
input, textarea, select, .json-display { user-select: text; }

/* ================================================================
   ① PC専用 3カラムレイアウト（モバイル対応完全削除）
================================================================ */
.app {
  display: grid;
  grid-template-rows: var(--hdr) 1fr;
  height: 100vh;
}

/* ヘッダー */
.hdr {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 200;
}
.hdr-title { font-size: 0.88rem; font-weight: 700; color: var(--accent); letter-spacing: 0.04em; }
.hdr-badge {
  background: var(--accent);
  color: #fff;
  font-size: 0.68rem;
  font-weight: 700;
  padding: 2px 9px;
  border-radius: 12px;
}
.hdr-sep { flex: 1; }
.hdr-shortcuts {
  font-size: 0.66rem;
  color: var(--muted);
  display: flex;
  gap: 12px;
}
.hdr-shortcuts kbd {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  font-family: inherit;
  font-size: 0.65rem;
  color: var(--text2);
}
.hdr-btn-group { display: flex; gap: 6px; }

/* 3カラム本体 */
.cols {
  display: grid;
  grid-template-columns: 360px 1fr 400px;
  height: 100%;
  min-height: 0;
}

/* 幅1400px以下：右カラム（プレビュー・JSON）を非表示 */
@media (max-width: 1400px) {
  .cols {
    grid-template-columns: 360px 1fr;
  }
  .right-col {
    display: none;
  }
  html, body { overflow: auto; height: auto; }
  .app { height: auto; min-height: 100vh; }
  .cols { height: auto; overflow: visible; }
  .col { overflow-y: visible; height: auto; }
}

/* 幅900px以下：左カラム（フォーム）も縮小 */
@media (max-width: 900px) {
  .cols {
    grid-template-columns: 300px 1fr;
  }
}

/* 各カラム：独立スクロール */
.col {
  overflow-y: auto;
  overflow-x: hidden;
  border-right: 1px solid var(--border);
  height: 100%;
  min-height: 0;
}
.col:last-child { border-right: none; }

/* スクロールバースタイル */
.col::-webkit-scrollbar { width: 5px; }
.col::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

/* カラムヘッダー */
.col-hdr {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
}
.col-hdr-count { color: var(--accent); font-size: 0.65rem; }

/* ================================================================
   左カラム：入力フォーム
================================================================ */
.form-col { padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; }

/* ③ 編集モード視覚表示 */
.form-col.edit-mode { background: rgba(79,142,247,0.04); }
.edit-mode-banner {
  display: none;
  background: rgba(79,142,247,0.15);
  border: 1px solid rgba(79,142,247,0.35);
  border-radius: var(--r);
  padding: 6px 10px;
  font-size: 0.72rem;
  color: var(--accent);
  font-weight: 700;
  align-items: center;
  gap: 6px;
}
.edit-mode-banner.show { display: flex; }

/* フォームセクション */
.fsec {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px 12px;
}
.fsec-title {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}

/* フォームグリッド */
.fg { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.fg .full { grid-column: 1 / -1; }

/* フィールド */
.field { display: flex; flex-direction: column; gap: 3px; }
.field label {
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.03em;
}

/* ③ エラー状態 */
.field.error input, .field.error textarea, .field.error select {
  border-color: var(--red) !important;
}
.field-err {
  font-size: 0.62rem;
  color: var(--red);
  min-height: 14px;
  line-height: 1.3;
}

/* 入力要素 */
input, textarea, select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.82rem;
  padding: 6px 9px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
input::placeholder, textarea::placeholder { color: var(--muted); }
textarea { resize: vertical; min-height: 58px; line-height: 1.45; }

/* RJヒント */
.rj-hint { font-size: 0.62rem; color: var(--green); min-height: 14px; }

/* ⑦ タグ候補 */
/* ジャンル選択ボタン（CORE_TYPES のコアタグ） */
.tag-core-btn {
  padding: 3px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text2);
  font-size: 0.72rem;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
}
.tag-core-btn:hover { border-color: var(--accent); color: var(--accent); }
.tag-core-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 700;
}

.tag-candidates {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 3px;
}
.tag-chip {
  padding: 2px 8px;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 0.65rem;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.12s;
}
.tag-chip:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.tag-chip.selected { background: rgba(79,142,247,0.2); border-color: var(--accent); color: var(--accent); }

/* カテゴリ削除済み */
select { cursor: pointer; }
select option { background: var(--surface2); }

/* ボタン */
.btn {
  padding: 6px 14px;
  border: none;
  border-radius: 5px;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.12s, transform 0.1s;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.btn:hover  { opacity: 0.85; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent);  color: #fff; }
.btn-green   { background: var(--green);   color: #0c0e14; }
.btn-red     { background: var(--red);     color: #fff; }
.btn-amber   { background: var(--amber);   color: #0c0e14; }
.btn-ghost   { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-row { display: flex; gap: 6px; flex-wrap: wrap; }

/* ================================================================
   ④ 中央カラム：テーブル風一覧
================================================================ */
.list-col {}

/* テーブルヘッダー */
.tbl-head {
  display: grid;
  grid-template-columns: 24px 1fr 80px 60px 60px 40px;
  gap: 0;
  padding: 5px 8px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-size: 0.62rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  position: sticky;
  top: 37px; /* col-hdr分 */
  z-index: 9;
}

/* ④ テーブル行 */
.tbl-body { padding: 0; }

.tbl-row {
  display: grid;
  grid-template-columns: 24px 1fr 80px 60px 60px 40px;
  align-items: center;
  padding: 5px 8px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.tbl-row:hover { background: var(--surface2); }

/* ④ 選択行ハイライト */
.tbl-row.selected {
  background: rgba(79,142,247,0.1);
  border-color: rgba(79,142,247,0.2);
}
.tbl-row.selected .tbl-num { color: var(--accent); }

/* ⑥ ドラッグ中スタイル */
.tbl-row.dragging   { opacity: 0.4; background: var(--surface3); }

/* ⑨ ドロップ位置インジケーター：行の上下に青いラインを表示 */
.tbl-row.drop-above { box-shadow: 0 -2px 0 0 var(--accent); }
.tbl-row.drop-below { box-shadow: 0  2px 0 0 var(--accent); }

/* セル */
.tbl-num  { font-size: 0.65rem; color: var(--muted); text-align: center; }
.tbl-title {
  font-size: 0.78rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding-right: 6px;
}
.tbl-id    { font-size: 0.65rem; color: var(--text2); font-family: monospace; }
.tbl-price { font-size: 0.68rem; color: var(--amber); text-align: right; }
.tbl-tags  {
  font-size: 0.6rem;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ④ ホバー時の操作ボタン */
.tbl-actions {
  display: flex;
  gap: 2px;
  justify-content: flex-end;
  opacity: 0;
  transition: opacity 0.1s;
}
.tbl-row:hover .tbl-actions { opacity: 1; }
.tbl-row.selected .tbl-actions { opacity: 1; }

.tbl-act-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 0.8rem;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 3px;
  transition: color 0.1s, background 0.1s;
  line-height: 1;
}
.tbl-act-btn:hover { color: var(--text); background: var(--surface3); }
.tbl-act-btn.del:hover { color: var(--red); }
.tbl-act-btn.ext { font-size: 0.68rem; }

/* ⑥ ドラッグハンドル */
.drag-handle {
  cursor: grab;
  color: var(--muted);
  font-size: 0.75rem;
  text-align: center;
  line-height: 1;
  padding: 0 2px;
}
.drag-handle:active { cursor: grabbing; }
/* フィルター中はドラッグ不可を視覚的に示す */
.filter-active .drag-handle {
  cursor: not-allowed;
  opacity: 0.3;
}

/* 空メッセージ */
.empty-msg {
  text-align: center;
  padding: 40px 16px;
  color: var(--muted);
  font-size: 0.8rem;
}

/* ================================================================
   右カラム：プレビュー + JSON
================================================================ */
.right-col {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 100%; /* 親の高さを継承してJSON欄が押し出されないようにする */
}

/* プレビューエリア：高さを固定して縦いっぱいにならないようにする */
.preview-area {
  flex: 0 0 auto;
  overflow: visible;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  background: #0b0d12;
}

/* プレビューカード */
.preview-card {
  background: #13171f;
  border: 1px solid rgba(120,150,200,0.1);
  border-radius: 10px;
  overflow: hidden;
}
.preview-img {
  width: 100%;
  object-fit: cover;
  display: block;
  background: #1c2130;
  height: 140px; /* 固定高さでJSONエリアを守る */
  max-height: 140px;
}
.preview-body { padding: 10px 12px 12px; }
.preview-title { font-size: 0.82rem; font-weight: 700; line-height: 1.4; margin-bottom: 4px; color: #d8e0ec; }
.preview-desc  { font-size: 0.68rem; color: #6b7a96; line-height: 1.5; margin-bottom: 8px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.preview-tags  { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 8px; }
.preview-tag   { font-size: 0.6rem; padding: 1px 6px; background: rgba(91,141,238,0.1);
  border: 1px solid rgba(91,141,238,0.2); border-radius: 8px; color: #7eb8d4; }
.preview-cta   { display: block; text-align: center; padding: 7px;
  background: linear-gradient(135deg, #7eb8d4, #5a9db8); border-radius: 6px;
  color: #0b0e13; font-size: 0.75rem; font-weight: 700; }
.preview-placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; padding: 30px 16px; color: var(--muted); font-size: 0.75rem; text-align: center;
  border: 1px dashed var(--border); border-radius: 10px;
}

/* ⑧ JSONエリア（下半分）：flex + 独立スクロール */
.json-area {
  flex: 1 1 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 8px 12px 10px;
}
.json-area-hdr {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
  flex-shrink: 0;
}
.json-area-title { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; flex: 1; }

/* ⑧ 行番号付きJSONエリア */
.json-wrap {
  flex: 1 1 0;
  overflow: auto;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  display: flex;
}
.json-lines {
  display: none;
}
.json-display {
  flex: 1;
  min-width: 0;
  padding: 10px 12px;
  font-family: "Consolas","Courier New",monospace;
  font-size: 0.7rem;
  line-height: 1.6;
  color: #a8b8d0;
  white-space: pre;
  overflow: visible;
}

/* ⑨ インポート用非表示input */
#importFile { display: none; }

/* ================================================================
   トースト / エラーバナー
================================================================ */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 9px 18px;
  border-radius: 7px;
  font-size: 0.78rem;
  font-weight: 700;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.22s, transform 0.22s;
  pointer-events: none;
  z-index: 9999;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok   { background: var(--green); color: #0c0e14; }
.toast.err  { background: var(--red);   color: #fff; }
.toast.info { background: var(--accent); color: #fff; }
/* 【7】アンドゥトースト（削除直後に「元に戻す」を表示） */
.undo-toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(8px);
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 8px; padding: 10px 16px;
  display: flex; align-items: center; gap: 12px;
  font-size: 0.78rem; color: var(--text);
  opacity: 0; pointer-events: none;
  transition: opacity 0.22s, transform 0.22s;
  z-index: 9998; white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.undo-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: all; }
.undo-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 4px; padding: 3px 12px; font-size: 0.75rem;
  font-weight: 700; cursor: pointer; font-family: inherit;
}
.undo-btn:hover { opacity: 0.85; }
/* 【3】モーダル */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 10000; opacity: 0; pointer-events: none;
  transition: opacity 0.18s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal-box {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 10px; padding: 22px 24px; min-width: 300px; max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.modal-msg { font-size: 0.88rem; line-height: 1.6; margin-bottom: 18px; color: var(--text); }
.modal-btns { display: flex; justify-content: flex-end; gap: 8px; }
</style>
</head>
<body>

<div class="app">

  <!-- ===== ヘッダー ===== -->
  <header class="hdr">
    <span class="hdr-title">📋 works.json エディター Pro</span>
    <span class="hdr-badge" id="countBadge">0 件</span>
    <span class="hdr-sep"></span>

    <!-- ② キーボードショートカット表示 -->
    <div class="hdr-shortcuts">
      <span><kbd>Ctrl+Enter</kbd> 追加</span>
      <span><kbd>Ctrl+⇧+C</kbd> コピー</span>
      <span><kbd>↑↓</kbd> 選択</span>
      <span><kbd>Del</kbd> 削除</span>
      <span><kbd>Esc</kbd> キャンセル</span>
    </div>

    <!-- ⑨ エクスポート / インポート -->
    <div class="hdr-btn-group">
      <button class="btn btn-ghost" id="exportBtn" title="JSONをファイルに保存">⬇ Export</button>
      <label for="importFile" class="btn btn-ghost" title="JSONファイルを読み込む" style="cursor:pointer;">⬆ Import</label>
      <button class="btn btn-ghost" id="openJsonBtn" title="works.jsonをpushするコマンドをコピー">📤 works.json をpush</button>
      <input type="file" id="importFile" accept=".json" />
      <button class="btn btn-red"   id="clearAllBtn" title="全件削除">🗑 全消去</button>
    </div>
  </header>

  <!-- ===== 3カラム本体 ===== -->
  <div class="cols">

    <!-- ════════ 左：入力フォーム ════════ -->
    <div class="col">
      <div class="col-hdr">
        ✏️ 入力フォーム
        <span id="editModeBadge" style="display:none;color:var(--amber);font-weight:700">編集中</span>
      </div>

      <div class="form-col" id="formCol">

        <!-- ⑤ 編集モードバナー -->
        <div class="edit-mode-banner" id="editBanner">
          ✏️ 編集モード — <span id="editBannerTitle"></span>
          <span style="flex:1"></span>
          <button class="btn btn-ghost" id="cancelEditBtn" style="padding:3px 10px;font-size:0.7rem">キャンセル</button>
        </div>

        <!-- URL入力 -->
        <div class="fsec">
          <p class="fsec-title">URL → 自動入力</p>
          <div class="field" id="fld-url">
            <label>DLsite URL <span style="color:var(--red)">*</span></label>
            <input type="url" id="urlInput" tabindex="1"
                   placeholder="https://www.dlsite.com/.../RJxxxxxx.html"
                   autocomplete="off" />
            <span class="rj-hint" id="rjHint"></span>
            <span class="field-err" id="err-url"></span>
          </div>
        </div>

        <!-- 基本情報 -->
        <div class="fsec">
          <p class="fsec-title">基本情報</p>
          <div class="fg">
            <div class="field" id="fld-id">
              <label>ID (RJxxxxxx)</label>
              <input type="text" id="fId" tabindex="2" placeholder="RJ000000" />
              <span class="field-err" id="err-id"></span>
            </div>
            <div class="field" id="fld-price">
              <label>価格（円） <span style="color:var(--red)">*</span></label>
              <input type="number" id="fPrice" tabindex="3" placeholder="880" min="0" />
              <span class="field-err" id="err-price"></span>
            </div>

            <!-- 癒し度・刺激度（空欄=自動計算） -->
            <div class="field">
              <label>💚 癒し度
                <span style="font-size:0.65rem;color:var(--muted);font-weight:400;">（空欄で自動）</span>
              </label>
              <div style="display:flex;align-items:center;gap:8px;">
                <input type="range" id="fHealing" min="0" max="5" step="1" value=""
                       style="flex:1;accent-color:#5dc4a8;" />
                <span id="fHealingVal" style="font-size:0.8rem;color:#5dc4a8;font-weight:700;min-width:16px;">-</span>
                <button class="btn btn-ghost" id="clearHealingBtn"
                        style="padding:2px 8px;font-size:0.65rem;">✕</button>
              </div>
            </div>
            <div class="field">
              <label>🔞 刺激度

const TAG_ORDER_EDITOR = (() => {
  const order = [];
  CORE_TYPES.forEach(c => order.push(c.key));
  Object.values(ATTRIBUTES).forEach(g => g.tags.forEach(t => { if (!order.includes(t)) order.push(t); }));
  return order;
})();

function sortTagsByOrder(tags) {
  return [...tags].sort((a, b) => {
    const ia = TAG_ORDER_EDITOR.indexOf(a);
    const ib = TAG_ORDER_EDITOR.indexOf(b);
    if (ia === -1 && ib === -1) return 0;
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });
}

    <div id="tagChipLayer"></div>

  // コアボタンのクリック：fTagsのコアタグを置き換えて属性チップを再描画
  tagCandidates.querySelectorAll(".tag-core-btn").forEach(btn => {

      selectedCore = btn.dataset.core;

      const current    = parseTags(fTags.value);
      const attrTags   = current.filter(t => !CORE_TAG_KEYS.includes(t));
      fTags.value      = [selectedCore, ...attrTags].join(", ");

      renderTagChips();
      syncTagChips();
      updatePreview();
    });
  });

  renderTagChips();
}

// 属性チップを描画する（selectedCore に依存しない・全属性を表示）
function renderTagChips() {
  const layer = document.getElementById("tagChipLayer");
  if (!layer) return;

  // コアボタンのactive更新
  tagCandidates.querySelectorAll(".tag-core-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.core === selectedCore);
  });

  // 属性グループを描画
  layer.innerHTML = `
    <div style="font-size:0.6rem;color:var(--muted);margin:0 0 4px;letter-spacing:0.06em;">
      ② 属性（複数選択OK）
    </div>
    ${Object.values(ATTRIBUTES).map(group => `
      <div style="font-size:0.6rem;color:var(--muted);margin:6px 0 3px;">${group.label}</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:2px;">
        ${group.tags.map(t =>
          `<span class="tag-chip" data-tag="${t}">${t}</span>`
        ).join("")}
      </div>
    `).join("")}
  `;

  // チップクリックでfTagsを更新
  layer.querySelectorAll(".tag-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      const tag     = chip.dataset.tag;
      const current = parseTags(fTags.value);
      fTags.value   = current.includes(tag)
        ? current.filter(t => t !== tag).join(", ")
        : [...current, tag].join(", ");
      syncTagChips();
      updatePreview();
    });
  });

  syncTagChips();
}

// タグ入力に合わせてチップの選択状態を更新
function syncTagChips() {
  const current = parseTags(fTags.value);
  tagCandidates.querySelectorAll(".tag-chip").forEach(chip => {
    chip.classList.toggle("selected", current.includes(chip.dataset.tag));
  });
  // コアボタンもfTags入力と同期
  tagCandidates.querySelectorAll(".tag-core-btn").forEach(btn => {
    const isSelected = current.includes(btn.dataset.core);
    btn.classList.toggle("active", isSelected);
    if (isSelected) selectedCore = btn.dataset.core;
  });
}

// ⑧ 共通：タグを優先順位でソートして上位N件を返す
// CTAとreviewで同じロジックを使うことで内容の一貫性を保つ
// ──────────────────────────────────────
function extractTopTags(tags, n = 2) {
  const normalized = normalizeTags(tags);
  return [...normalized]
    .sort((a, b) => {
      const ra = CTA_TAG_PRIORITY.indexOf(a);
      const rb = CTA_TAG_PRIORITY.indexOf(b);
      return (ra === -1 ? 999 : ra) - (rb === -1 ? 999 : rb);
    })
    .slice(0, n);
}

const _usedBases = new Set();
function pickBase(list) {
  let candidates = list.filter(x => !_usedBases.has(x));
  if (candidates.length === 0) {
    _usedBases.clear();
    candidates = list;
  }
  const picked = candidates[Math.floor(Math.random() * candidates.length)];
  _usedBases.add(picked);
  return picked;
}

function normalizeTags(tags) {
  let t = [...tags];
  if (t.includes("無言") && t.includes("囁き"))   t = t.filter(x => x !== "囁き");
  if (t.includes("無言") && t.includes("添い寝")) t = t.filter(x => x !== "添い寝");
  return t;
}

    ["いちゃいちゃ", "密着", "甘やかし"].includes(t)
  ).length;

  if (isR18 && isSweet)       return "R18甘々"; // ① R18 × 甘々（最強）
  if (isR18 && moodCount >= 2) return "R18甘々"; // ② R18 × ムード2個以上（誤爆防止）
  if (isR18)                   return "R18";
  if (isHeal && isSweet)       return "癒し甘々"; // ③ 癒し × 甘々
  if (isHeal && moodCount >= 2) return "癒し甘々"; // ④ 癒し × ムード2個以上（誤爆防止）
  if (isSweet)                 return "甘々";
  if (isHeal)                  return "癒し";
  return "睡眠導入";
}

function generateCta(tags) {
  if (!tags || tags.length === 0) return "迷ったらまずこれ。再生してそのまま眠れます。";

  const core = getCoreTag(tags);

  // さっくり×オナサポ 組み合わせ専用CTA
  if (tags.includes("さっくり") && tags.includes("オナサポ")) {
    const phrases = [
      "短時間でしっかり満足できるタイプ。",
      "サクッと済ませたい夜はこれ一択。",
      "時間がなくてもこれで十分。",
      "短くてもちゃんと満足できる。",
      "コンパクトなのに満足感が高い。",
    ];
    return phrases[Math.floor(Math.random() * phrases.length)];
  }

  // ニッチシチュタグ検知（優先判定）
  const NICHE_TAGS = new Set(["NTR","百合","男の娘","サキュバス","メスガキ","男性受け","逆転あり","催眠/トランス","異種族","乳首責め","強制","ヤンデレ","ハーレム"]);
  const nicheTag = tags.find(t => NICHE_TAGS.has(t));
  if (nicheTag) {
    const isR18core = core === "R18" || core === "R18甘々";
    const nicheSet  = isR18core ? CTA_TAG_PHRASES_NICHE_R18 : CTA_TAG_PHRASES_NICHE;
    const nichePhrases = nicheSet[nicheTag];

    const NICHE_EXPERIENCE = {
      "NTR":           ["罪悪感と興奮が同時に来て、止まれません。", "背徳感が癖になるタイプです。", "最初から最後まで引き込まれます。"],
      "百合":          ["尊さがずっと続いて、聴いてるだけで満たされます。", "甘くて尊い雰囲気が最後まで続きます。", "ずっと聴いていたくなるタイプです。"],
      "男の娘":        ["声質が独特で、気づいたら没頭しています。", "聴いていると癖になるタイプです。", "最初から最後まで引き込まれます。"],
      "サキュバス":    ["引き込まれていく感覚がリアルで止まれません。", "気づいたら最後まで聴いてるタイプです。", "没入感が段違いです。"],
      "メスガキ":      ["煽りが癖になって、止まれないタイプです。", "聴いてると癖になります。", "最初から最後まで引き込まれます。"],
      "男性受け":      ["責められながら甘やかされる感覚が続きます。", "最初から最後まで引き込まれます。", "気づいたら没頭しています。"],
      "逆転あり":      ["逆転してからの展開が止まれません。", "途中の変化がたまらないタイプです。", "最後まで目が離せません。"],
      "催眠/トランス": ["じわじわ落とされていく感覚が止まれません。", "引き込まれていくうちに抜け出せなくなります。", "最初から最後まで没入できます。"],
      "異種族":        ["設定と声のバランスが絶妙で引き込まれます。", "世界観に没入できる作品です。", "気づいたら最後まで聴いてるタイプです。"],
      "乳首責め":      ["責め続けられる感覚がリアルで止まれません。", "ねちっこさが癖になるタイプです。", "最初から最後まで引き込まれます。"],
      "強制":          ["背徳感と興奮が同時に来て止まれません。", "最初から最後まで引き込まれます。", "気づいたら没頭しています。"],
      "ハーレム":      ["全員違う声質で、最初から最後まで飽きません。", "複数人の声に囲まれる感覚がリアルです。", "キャラごとの個性が際立っていて止まれません。"],
      "ヤンデレ":      ["愛の重さが癖になって止まれません。", "束縛感がずっと続いて引き込まれます。", "聴いてると癖になるタイプです。"],
    };

    if (nichePhrases) {
      const base = nichePhrases[Math.floor(Math.random() * nichePhrases.length)];
      const expList = NICHE_EXPERIENCE[nicheTag];
      const exp = expList ? expList[Math.floor(Math.random() * expList.length)] : "";
      return exp ? `${base} ${exp}` : base;
    }
  }

  // R18甘々（R18 + ムードタグ補正）
  if (core === "R18甘々") {
    const attrTags = tags.filter(t => t !== "R18");
    const [top1]   = extractTopTags(attrTags);
    const base     = pickBase(CTA_BASE_R18_AMAMA);
    const phrases  = CTA_TAG_PHRASES_R18[top1];
    const phrase   = phrases
      ? phrases[Math.floor(Math.random() * phrases.length)]
      : pickR18Fallback(true);
    return `${base} ${phrase}`.trim();
  }

  // R18の場合
  if (core === "R18") {
    const [top1] = extractTopTags(tags.filter(t => t !== "R18"));
    const base     = pickBase(CTA_BASE_R18);
    const phrases  = CTA_TAG_PHRASES_R18[top1];
    const phrase   = phrases
      ? phrases[Math.floor(Math.random() * phrases.length)]
      : pickR18Fallback(false);
    return `${base} ${phrase}`.trim();
  }

  // 甘々の場合
  if (core === "甘々") {
    const [top1] = extractTopTags(tags.filter(t => t !== "甘々"));
    const base   = pickBase(CTA_BASE_AMAMA);
    const amamaPhrases = CTA_TAG_PHRASES_AMAMA[top1];
    const phrase = amamaPhrases
      ? amamaPhrases[Math.floor(Math.random() * amamaPhrases.length)]
      : "甘えた声が続いて、そのまま心地よくなれます。";
    return `${base} ${phrase}`.trim();
  }

  // 癒し甘々の場合
  if (core === "癒し甘々") {
    const attrTags = tags.filter(t => t !== "癒し" && t !== "甘々");
    const [top1]   = extractTopTags(attrTags);
    const base     = pickBase(CTA_BASE_HEAL_AMAMA);
    const healPhrases = CTA_TAG_PHRASES_HEAL[top1];
    const phrase   = healPhrases
      ? healPhrases[Math.floor(Math.random() * healPhrases.length)]
      : "優しい声に包まれながら、体の力がじわじわ抜けていきます。";
    return `${base} ${phrase}`.trim();
  }

  // 癒しの場合
  if (core === "癒し") {
    const [top1] = extractTopTags(tags.filter(t => t !== "癒し"));
    const base   = pickBase(CTA_BASE_HEAL);
    const healPhrases = CTA_TAG_PHRASES_HEAL[top1];
    const phrase = healPhrases
      ? healPhrases[Math.floor(Math.random() * healPhrases.length)]
      : "聴くだけでじわじわ力が抜けていきます。";
    return `${base} ${phrase}`.trim();
  }

  // 睡眠導入（既存ロジック）
  const [top1] = extractTopTags(tags);
  const baseList = CTA_STRONG_TAGS.has(top1) ? CTA_BASE_STRONG
                 : CTA_MID_TAGS.has(top1)    ? CTA_BASE_MID
                 : CTA_BASE_NORMAL;
  const base   = pickBase(baseList);
  const phrase = pickPhrase(top1);
  return `${base} ${phrase}`.trim();
}

function generateReview(tags, title = "") {
  if (!tags || tags.length === 0) {
    return title
      ? `${title}は癒し系のASMR作品です。リラックスしたい方におすすめ。`
      : "睡眠導入向けのASMR作品です。就寝前に再生してみてください。";
  }

  const core = getCoreTag(tags);

  // R18甘々（R18 + ムードタグ補正）
  if (core === "R18甘々") {
    const attrTags = tags.filter(t => t !== "R18");
    const [top1, top2] = extractTopTags(attrTags);
    const feature1 = REVIEW_FEATURE_R18[top1] ?? REVIEW_FEATURE[top1] ?? "";
    const feature2 = top2 && (REVIEW_FEATURE_R18[top2] ?? REVIEW_FEATURE[top2])
      ? (REVIEW_FEATURE_R18[top2] ?? REVIEW_FEATURE[top2])
      : "";
    const ending = pickEndingR18(true); // amama=true
    const front  = feature2 ? `${feature1} ${feature2}` : feature1;
    return `${front} ${ending}`.trim();
  }

  // R18の場合
  if (core === "R18") {
    const attrTags = tags.filter(t => t !== "R18");
    const [top1, top2] = extractTopTags(attrTags);
    const feature1 = REVIEW_FEATURE_R18[top1] ?? REVIEW_FEATURE[top1] ?? "";
    const feature2 = top2 && (REVIEW_FEATURE_R18[top2] ?? REVIEW_FEATURE[top2])
      ? (REVIEW_FEATURE_R18[top2] ?? REVIEW_FEATURE[top2])
      : "";
    const ending = pickEndingR18(false);
    const front  = feature2 ? `${feature1} ${feature2}` : feature1;
    return `${front} ${ending}`.trim();
  }

  // 癒し甘々の場合
  if (core === "癒し甘々") {
    const attrTags = tags.filter(t => t !== "癒し" && t !== "甘々");
    const [top1, top2] = extractTopTags(attrTags);
    const feature1 = REVIEW_FEATURE[top1] ?? "";
    const feature2 = top2 && REVIEW_FEATURE[top2] && REVIEW_FEATURE[top2] !== feature1
      ? REVIEW_FEATURE[top2] : "";
    const ending = "疲れた体を優しく包んでほぐしてくれる作品です。";
    const front  = feature2 ? `${feature1} ${feature2}` : feature1;
    return `${front} ${ending}`.trim();
  }

  // 癒しの場合
  if (core === "癒し") {
    const attrTags = tags.filter(t => t !== "癒し");
    const [top1, top2] = extractTopTags(attrTags);
    const feature1 = REVIEW_FEATURE[top1] ?? "";
    const feature2 = top2 && REVIEW_FEATURE[top2] && REVIEW_FEATURE[top2] !== feature1
      ? REVIEW_FEATURE[top2] : "";
    const ending = "心と体の緊張をほぐしてくれる作品です。";
    const front  = feature2 ? `${feature1} ${feature2}` : feature1;
    return `${front} ${ending}`.trim();
  }

  // 睡眠導入・甘々（既存ロジック）
  const [top1, top2] = extractTopTags(tags);
  const feature1 = REVIEW_FEATURE[top1] ?? "";
  const feature2 = top2 && REVIEW_FEATURE[top2] && REVIEW_FEATURE[top2] !== feature1
    ? REVIEW_FEATURE[top2]
    : "";
  const endingRaw = pickEnding();
  const ending = tags.includes("長時間")
    ? endingRaw.replace(/。?$/, "ので、") + pickLongtimePhrase()
    : endingRaw;
  const front = feature2 ? `${feature1} ${feature2}` : feature1;
  return `${front} ${ending}`.trim();
}

// ④ isAutoCTAフラグ
// true  = 自動生成中（タグ変更で再生成OK）
// false = 手動編集済み（タグ変更でも上書きしない）
let isAutoCTA = true;

// CTA自動生成の一元管理関数
// ここを通してセットすることでフラグを確実にONにする
function setAutoCTA(tags) {
  const text = generateCta(tags);
  fCta.value = text;
  isAutoCTA  = true; // 生成時は必ずON
}

// fCtaへの手入力でフラグをOFF
// ④ 事故防止：コピーボタン・ドラフト復元では発火しないよう
//    ユーザーの直接入力のみ検知する
fCta.addEventListener("input", () => {
  isAutoCTA = false;
});

fTitle.addEventListener("input", () => {
  const title = fTitle.value.trim();
  if (!title) return;
  // descriptionが空のときだけ自動生成（タグベース・手動編集は上書きしない）
  if (!fDesc.value.trim()) {
    fDesc.value = generateReview(parseTags(fTags.value), title);
  }
  // CTAが空 or 自動生成中のときだけ生成
  if (!fCta.value.trim() || isAutoCTA) {
    setAutoCTA(parseTags(fTags.value));
  }
  updatePreview();
  updateTitleTagSuggestions();
});

// タイトルからタグ候補を検出してボタン表示
function updateTitleTagSuggestions() {
  const wrap = document.getElementById("titleTagSuggestions");
  const btnWrap = document.getElementById("titleTagSuggestionBtns");
  if (!wrap || !btnWrap) return;

  const title = fTitle.value.trim();
  if (!title) { wrap.style.display = "none"; return; }

  // 全タグリストを収集
  const allTags = [
    ...CORE_TYPES.map(c => c.key),
    ...Object.values(ATTRIBUTES).flatMap(g => g.tags ?? [])
  ];
  const currentTags = new Set(parseTags(fTags.value));

  // タイトルに含まれていて、まだ登録されていないタグを候補にする
  const suggestions = allTags.filter(tag =>
    title.includes(tag) && !currentTags.has(tag)
  );

  if (suggestions.length === 0) { wrap.style.display = "none"; return; }

  wrap.style.display = "block";
  btnWrap.innerHTML = "";
  suggestions.forEach(tag => {
    const btn = document.createElement("button");
    btn.textContent = `+ ${tag}`;
    btn.style.cssText = "font-size:0.7rem;padding:2px 10px;border-radius:10px;border:1px solid rgba(245,197,24,0.5);background:rgba(245,197,24,0.12);color:var(--amber);cursor:pointer;";
    btn.onclick = () => {
      const current = parseTags(fTags.value);
      if (!current.includes(tag)) {
        fTags.value = [...current, tag].join(", ");
        syncTagChips();
        updatePreview();
      }
      updateTitleTagSuggestions(); // 追加後に候補を更新
    };
    btnWrap.appendChild(btn);
  });
}

// プレビューを更新するフィールド群（fTagsはCTA更新も兼ねるため下で登録）

);

// タグが変わったらCTA・description自動更新
fTags.addEventListener("input", () => {

    setAutoCTA(tags);
  }
  // descriptionも未入力 or タグが変わって空なら再生成
  if (!fDesc.value.trim() && title) {

});

function updatePreview() {
  const title = fTitle.value.trim();
  const desc  = fDesc.value.trim();
  const img   = fImage.value.trim();
  const cta   = fCta.value.trim() || "今すぐ聴いて癒される";
  const tags  = parseTags(fTags.value);

  if (!title && !img) {
    previewWrap.innerHTML = `<div class="preview-placeholder">
      <span style="font-size:2rem;opacity:.35">🎧</span>
      <span>URLかタイトルを入力</span></div>`;
    return;
  }
  const tagsHtml = sortTagsByOrder(tags).map(t => `<span class="preview-tag">${esc(t)}</span>`).join("");
  const imgHtml = img
    ? `<img class="preview-img" src="${esc(safeUrl(img))}" alt="${esc(title)}" onerror="this.style.display='none'">`
    : `<div class="preview-img" style="display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:#2a3050">🎧</div>`;

  previewWrap.innerHTML = `
    <div class="preview-card">
      ${imgHtml}
      <div class="preview-body">
        <p class="preview-title">${esc(title) || "タイトル未入力"}</p>
        ${tags.length ? `<div class="preview-tags">${tagsHtml}</div>` : ""}
        <p class="preview-desc">${esc(desc) || "説明文未入力"}</p>
        <span class="preview-cta">🎧 ${esc(cta)}</span>
      </div>
    </div>`;
}

// ──────────────────────────────────────
// ③ バリデーション（alertなし・UI内表示）
// ──────────────────────────────────────
function setFieldError(fieldId, errId, msg) {
  const fld = document.getElementById(fieldId);
  const err = document.getElementById(errId);
  if (msg) {
    fld?.classList.add("error");
    if (err) err.textContent = msg;
  } else {
    fld?.classList.remove("error");
    if (err) err.textContent = "";
  }
}

function clearAllErrors() {
  ["fld-url","fld-id","fld-title","fld-price","fld-image","fld-tags"].forEach(id => {
    document.getElementById(id)?.classList.remove("error");
  });
  ["err-url","err-id","err-title","err-price","err-image","err-tags"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = "";
  });
}

// フォームの値を収集してバリデーション
// 戻り値: { valid: bool, work: obj }
function validateAndBuild() {
  clearAllErrors();
  let valid = true;

  const url   = urlInput.value.trim();
  const title = fTitle.value.trim();
  const id    = fId.value.trim();
  const price = fPrice.value.trim();

  if (!url)   { setFieldError("fld-url",   "err-url",   "URLは必須です"); valid = false; }
  if (!title) { setFieldError("fld-title", "err-title", "タイトルは必須です"); valid = false; }
  if (!price) { setFieldError("fld-price", "err-price", "価格は必須です"); valid = false; }

  // ⑨ 画像URLの軽いバリデーション（http(s)で始まり画像拡張子を含むか）
  const imageVal = fImage.value.trim();
  if (imageVal && !safeUrl(imageVal)) {
    setFieldError("fld-image", "err-image", "画像URLはhttps://から始めてください");
    valid = false;
  }

  // 重複チェック：自分自身（editIdx）は除外して他の作品と比較
  if (id && works.some((w, i) => w.id === id && i !== editIdx)) {
    setFieldError("fld-id", "err-id", `「${id}」は追加済みです`);
    valid = false;
  }

  if (!valid) return { valid: false };

  const tags = sortTagsByOrder(parseTags(fTags.value));

  // コアタグ（CORE_TYPES のいずれか）が含まれているか確認
  if (!tags.some(t => CORE_TAG_KEYS.includes(t))) {
    setFieldError("fld-tags", "err-tags", "コアタグを1つ選択してください（睡眠導入 / 癒し / 甘々 / R18 / 全年齢）");
    valid = false;
  }

  if (!valid) return { valid: false };

  return {
    valid: true,
    work: {
      id,
      title,
      maker:       fMaker.value.trim() || "",
      cv:          fCv.value.trim() ? fCv.value.trim().split("/").map(s => s.trim()).filter(Boolean) : undefined,
      price:       Number(price) || 0,
      url:         safeUrl(url) || url, // ⑨ スキーム検証
      image:       safeUrl(imageVal) || "", // ⑨ 不正URLは空に
      tags:        sortTagsByOrder(tags), // 定義順で保存
      description: fDesc.value.trim() || "",
      cta:         fCta.value.trim() || "今すぐ聴いて癒される",
      healing:     healingManual, // null=自動計算、0〜5=手動
      ero:         eroManual,
      createdAt:   editIdx === -1
        ? new Date().toISOString()
        : (works[editIdx]?.createdAt ?? new Date().toISOString()),
    }
  };
}

function doAdd() {
  const { valid, work } = validateAndBuild();
  if (!valid) { showToast("必須項目を入力してください", "err"); return; }

  works.push(work);
  // ※ 追加順がそのまま保存順（ドラッグ並び替えを壊さないようsortしない）

  persist();
  clearDraft();
  updateJson();
  // ⑧ 追加後は末尾（最新）を選択状態にしてすぐ確認できるようにする
  selectedIdx = works.length - 1;
  renderTable(true);
  clearForm();
  showToast(`✅「${work.title}」を追加しました`, "ok");
}

addBtn.addEventListener("click", doAdd);

function enterEditMode(idx) {
  editIdx = idx;
  const w = works[idx];

  // フォームに値を反映
  urlInput.value  = w.url       || "";
  fId.value       = w.id        || "";
  fTitle.value    = w.title     || "";
  fMaker.value    = w.maker     || "";
  fCv.value       = (w.cv ?? []).join(" / ");
  fPrice.value    = w.price     || "";
  fImage.value    = w.image     || "";
  fTags.value     = (w.tags || []).join(", ");
  fDesc.value     = w.description || "";
  fCta.value      = w.cta       || "";
  rjHint.textContent = w.id ? `✅ ${w.id}` : "";

  // 癒し度・刺激度の復元（null=自動計算）
  healingManual = (w.healing != null) ? w.healing : null;
  eroManual     = (w.ero     != null) ? w.ero     : null;
  updateHealingDisplay(healingManual);
  updateEroDisplay(eroManual);

  // ④ 編集モードでは既存CTAを保護（タグ変更で上書きしない）
  isAutoCTA = false;

  syncTagChips();
  updatePreview();
  clearAllErrors();

  // UI表示切り替え
  addBtn.style.display    = "none";
  updateBtn.style.display = "";
  editBanner.classList.add("show");
  editBannerTitle.textContent = w.title;
  editModeBadge.style.display = "";
  formCol.classList.add("edit-mode");

  // 一覧の選択状態
  selectRow(idx);

  // フォームの先頭へスクロール
  document.querySelector(".col").scrollTop = 0;

  // JSONエリアを編集中作品の位置までスクロール
  setTimeout(() => {
    const jsonWrap = document.getElementById("jsonWrap");
    const json = JSON.stringify(works, null, 2);
    const lines = json.split("\n");
    // 編集中作品のidが何行目にあるか探す
    const targetId = works[idx]?.id;
    if (!targetId || !jsonWrap) return;
    let targetLine = 0;
    let workCount = -1;
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].includes('"id"')) workCount++;
      if (workCount === idx) { targetLine = i; break; }
    }
    // 1行あたりの高さ（font-size 0.7rem * line-height 1.6）
    const lineHeight = 0.7 * 16 * 1.6;
    jsonWrap.scrollTop = targetLine * lineHeight;
  }, 80);
}

// ④ テーブル描画（⑩ 差分更新）
// ──────────────────────────────────────
// 前回の renders ハッシュ（軽量差分比較用）
let lastRenderHash = "";

let activeTagFilter = null;
let activeCvFilter  = null;

function buildCvFilterBtns() {
  const wrap = document.getElementById("cvFilterBtns");
  if (!wrap) return;
  const allCvs = [...new Set(works.flatMap(w => w.cv ?? []))].sort((a, b) => a.localeCompare(b, 'ja'));
  wrap.innerHTML = "";
  if (allCvs.length === 0) return;

  const label = document.createElement("span");
  label.style.cssText = "font-size:0.65rem;color:var(--muted);padding:2px 4px;flex-shrink:0;";
  label.textContent = "🎙️ CV:";
  wrap.appendChild(label);

  const allBtn = document.createElement("button");
  allBtn.textContent = "すべて";
  allBtn.style.cssText = `font-size:0.7rem;padding:2px 8px;border-radius:10px;border:1px solid var(--border);background:${activeCvFilter === null ? "var(--accent)" : "var(--surface2)"};color:${activeCvFilter === null ? "#fff" : "var(--muted)"};cursor:pointer;`;
  allBtn.onclick = () => { activeCvFilter = null; buildCvFilterBtns(); renderTable(true); };
  wrap.appendChild(allBtn);

  allCvs.forEach(cv => {
    const btn = document.createElement("button");
    btn.textContent = cv;
    const isActive = activeCvFilter === cv;
    btn.style.cssText = `font-size:0.7rem;padding:2px 8px;border-radius:10px;border:1px solid var(--border);background:${isActive ? "#e8819a" : "var(--surface2)"};color:${isActive ? "#fff" : "var(--muted)"};cursor:pointer;`;
    btn.onclick = () => { activeCvFilter = isActive ? null : cv; buildCvFilterBtns(); renderTable(true); };
    wrap.appendChild(btn);
  });
}

function buildTagFilterBtns() {
  const wrap = document.getElementById("tagFilterBtns");
  if (!wrap) return;
  // 全タグを集計
  const allTags = [...new Set(works.flatMap(w => w.tags ?? []))].sort((a, b) => a.localeCompare(b, 'ja'));
  wrap.innerHTML = "";

  // 「すべて」ボタン
  const allBtn = document.createElement("button");
  allBtn.textContent = "すべて";
  allBtn.style.cssText = `font-size:0.7rem;padding:2px 8px;border-radius:10px;border:1px solid var(--border);background:${activeTagFilter === null ? "var(--accent)" : "var(--surface2)"};color:${activeTagFilter === null ? "#fff" : "var(--muted)"};cursor:pointer;`;
  allBtn.onclick = () => { activeTagFilter = null; buildTagFilterBtns(); renderTable(true); };
  wrap.appendChild(allBtn);

  allTags.forEach(tag => {
    const btn = document.createElement("button");
    btn.textContent = tag;
    const isActive = activeTagFilter === tag;
    btn.style.cssText = `font-size:0.7rem;padding:2px 8px;border-radius:10px;border:1px solid var(--border);background:${isActive ? "var(--accent)" : "var(--surface2)"};color:${isActive ? "#fff" : "var(--muted)"};cursor:pointer;`;
    btn.onclick = () => { activeTagFilter = isActive ? null : tag; buildTagFilterBtns(); renderTable(true); };
    wrap.appendChild(btn);
  });
}

function renderTable(force = false) {
  // ─────────────────────────────────────────────────────
  // TODO: 将来の規模拡大時に以下の3関数に分割すること
  //   getVisibleWorks() … フィルタリング・ハッシュ計算
  //   renderRows()      … HTML生成・DOM反映
  //   bindDragEvents()  … D&Dイベント登録
  // クリック系は起動時の委譲（tblBody.addEventListener）に移行済み
  // ─────────────────────────────────────────────────────

  // ── フィルタリング ────────────────────────────────────
  const filterQ = listFilter.value.trim().toLowerCase();
  const hash = works.length + "-" + selectedIdx + "-" + filterQ + "-" + (activeTagFilter ?? "") + "-" + (activeCvFilter ?? "")
             + "-" + (works[0]?.id ?? "") + "-" + (works[works.length-1]?.id ?? "");
  if (!force && hash === lastRenderHash) return;
  lastRenderHash = hash;

  const visible = works.filter(w => {
    const matchQ = !filterQ ||
      (w.title ?? "").toLowerCase().includes(filterQ) ||
      (w.id    ?? "").toLowerCase().includes(filterQ) ||
      (w.tags  ?? []).some(t => t.toLowerCase().includes(filterQ));
    const matchTag = !activeTagFilter || (w.tags ?? []).includes(activeTagFilter);
    const matchCv  = !activeCvFilter  || (w.cv  ?? []).includes(activeCvFilter);
    return matchQ && matchTag && matchCv;
  });

  countBadge.textContent = `${works.length} 件`;
  listCount.textContent  = (filterQ || activeTagFilter || activeCvFilter)
    ? `${visible.length}/${works.length}件`
    : `${works.length}件`;

  // フィルター中はD&D不可を視覚表示
  tblBody.classList.toggle("filter-active", !!filterQ);

  if (visible.length === 0) {
    tblBody.innerHTML = `<div class="empty-msg">${
      filterQ ? `「${filterQ}」に一致する作品はありません` : "まだ作品が追加されていません"
    }</div>`;
    return;
  }

  // ── HTML生成 ──────────────────────────────────────────
  tblBody.innerHTML = visible.map((w) => {
    const i = works.findIndex(x => x.id === w.id && x.createdAt === w.createdAt);
    return `
    <div class="tbl-row ${i === selectedIdx ? 'selected' : ''}"
         data-idx="${i}"
         draggable="true">
      <div class="drag-handle" title="ドラッグで並び替え">⠿</div>
      <div class="tbl-title" data-idx="${i}" title="${esc(w.title)}">${esc(w.title)}</div>
      <div class="tbl-id">${esc(w.id) || "—"}</div>
      <div class="tbl-price">${w.price ? Number(w.price).toLocaleString()+"円" : "—"}</div>
      <div class="tbl-tags">${esc(sortTagsByOrder(w.tags||[]).slice(0,3).join(", "))}</div>
      <div class="tbl-actions">
        <button class="tbl-act-btn ext" data-act="ext" data-idx="${i}" title="DLsiteで開く">↗</button>
        <button class="tbl-act-btn del" data-act="del" data-idx="${i}" title="削除">✕</button>
      </div>
    </div>`;
  }).join("");

  // ④ title をtextContentで上書き（XSSをesc()の後さらに確実に無効化）
  //    row.dataset.idx から確実にインデックスを取得する
  tblBody.querySelectorAll(".tbl-row").forEach(row => {
    const idx     = Number(row.dataset.idx);
    const titleEl = row.querySelector(".tbl-title");
    if (titleEl) titleEl.textContent = works[idx]?.title ?? "";
  });

  // ── D&Dイベント登録 ───────────────────────────────────
  // ※ クリック系は起動時に tblBody への委譲で登録済み（ここでは不要）
  // ※ D&Dは dragover/drop のターゲット特定が必要なため各行に個別登録を維持
  tblBody.querySelectorAll(".tbl-row").forEach(row => {
    // ⑥⑨ D&D + ドロップ位置インジケーター
    // （委譲では dragover/drop のターゲット特定が困難なため個別登録を維持）

    row.addEventListener("dragstart", e => {
      if (filterQ) { e.preventDefault(); return; }
      dragSrcIdx = Number(row.dataset.idx);
      row.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });

    row.addEventListener("dragend", () => {
      row.classList.remove("dragging");
      // ⑨ すべてのインジケーターをクリア
      _clearDropIndicators();
    });

    row.addEventListener("dragover", e => {
      if (filterQ) return;
      e.preventDefault();
      _clearDropIndicators();
      // ⑨ マウス位置が行の上半分か下半分かで挿入位置を決定
      const rect    = row.getBoundingClientRect();
      const midY    = rect.top + rect.height / 2;
      const isAbove = e.clientY < midY;
      row.classList.add(isAbove ? "drop-above" : "drop-below");
      // ⑨ どちらに挿入するかを行要素に記録（drop イベントで参照）
      row.dataset.dropPos = isAbove ? "above" : "below";
    });

    row.addEventListener("dragleave", () => {
      // 他の行に移ったときインジケーターを消す
      row.classList.remove("drop-above", "drop-below");
    });

    row.addEventListener("drop", e => {
      if (filterQ) return;
      e.preventDefault();
      _clearDropIndicators();

      const destIdx = Number(row.dataset.idx);
      const dropPos = row.dataset.dropPos ?? "above";
      delete row.dataset.dropPos;

      if (dragSrcIdx === -1 || dragSrcIdx === destIdx) return;

      // ⑨ 上半分にドロップ → destIdx の前、下半分 → destIdx の後
      const [moved] = works.splice(dragSrcIdx, 1);
      // splice後のインデックスを補正
      const insertAt = dragSrcIdx < destIdx
        ? (dropPos === "above" ? destIdx - 1 : destIdx)
        : (dropPos === "above" ? destIdx     : destIdx + 1);
      works.splice(Math.max(0, insertAt), 0, moved);

      if (selectedIdx === dragSrcIdx) selectedIdx = insertAt;
      if (editIdx    === dragSrcIdx) editIdx = insertAt;

      dragSrcIdx = -1;
      persist();
      renderTable(true);
      updateJson();
    });
  });
}

// ⑨ インジケーター全クリアのヘルパー
function _clearDropIndicators() {
  tblBody.querySelectorAll(".drop-above, .drop-below").forEach(r => {
    r.classList.remove("drop-above", "drop-below");
  });
}

// 【7】アンドゥ用バッファ

function deleteWork(idx) {
  const work  = works[idx];
  const title = work?.title ?? "";

  // 削除前の状態を保存（1件分のみ）
  _undoBuffer = { work: JSON.parse(JSON.stringify(work)), idx };

  works.splice(idx, 1);
  if (selectedIdx >= works.length) selectedIdx = works.length - 1;
  if (editIdx === idx) { exitEditMode(); clearForm(); }
  persist();
  renderTable(true);
  updateJson();

  // 【7】5秒間「元に戻す」ボタンをトーストに表示
  _showUndoToast(`🗑「${title}」を削除`);
}

function updateJson() {
  if (works.length === 0) {
    jsonDisplay.textContent = "";
    jsonLines.textContent   = "";
    return;
  }
  const json  = JSON.stringify(works, null, 2);
  const lines = json.split("\n");
  jsonDisplay.textContent = json;
  jsonLines.textContent   = lines.map((_, i) => i + 1).join("\n");

copyBtn.addEventListener("click", doCopy);

async function doCopy() {
  const json = JSON.stringify(works, null, 2);
  if (!json || works.length === 0) { showToast("コピーするデータがありません", "err"); return; }
  try {
    await navigator.clipboard.writeText(json);
    showToast("📋 JSONをコピーしました", "ok");
  } catch {
    // フォールバック
    const ta = document.createElement("textarea");
    ta.value = json;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showToast("📋 コピーしました", "ok");
  }
}

exportBtn.addEventListener("click", () => {
  if (works.length === 0) { showToast("エクスポートするデータがありません", "err"); return; }
  const blob = new Blob([JSON.stringify(works, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  // ファイル名を works.json に固定
  a.download = "works.json";
  a.click();
  URL.revokeObjectURL(a.href);
  showToast("⬇ エクスポートしました", "ok");
});

// ⑨ インポート（ファイル読み込み）
function handleImport() {
  const file = importFile.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const raw = JSON.parse(e.target.result);
      if (!Array.isArray(raw)) throw new Error("配列ではありません");

      // 【5】インポートデータをサニタイズ（各フィールドの型を強制）
      const data = raw.map(w => ({
        id:          String(w.id          ?? ""),
        title:       String(w.title       ?? "無題"),
        maker:       String(w.maker       ?? ""),
        price:       Number(w.price       ?? 0),
        url:         safeUrl(String(w.url ?? "")), // 【2】URLも検証
        image:       safeUrl(String(w.image ?? "")),
          tags:        Array.isArray(w.tags) ? w.tags.map(t => String(t)) : [],
        description: String(w.description ?? ""),
        cta:         String(w.cta         ?? ""),
        createdAt:   String(w.createdAt   ?? new Date().toISOString()),
      }));

      if (works.length > 0) {
        // 【3】confirm() → showConfirm()
        const overwrite = await showConfirm(
          `現在の${works.length}件のデータがあります。\n上書きしますか？（いいえ＝マージ）`,
          "上書き", "マージ"
        );
        if (overwrite) {
          works = data;
          showToast(`⬆ ${data.length}件をインポートしました`, "ok");
        } else {
          const existIds = new Set(works.map(w => w.id).filter(Boolean));
          const added = data.filter(w => !w.id || !existIds.has(w.id));
          works.push(...added);
          showToast(`⬆ ${added.length}件をマージしました`, "ok");
        }
      } else {
        works = data;
        showToast(`⬆ ${data.length}件をインポートしました`, "ok");
      }
      persist();
      renderTable(true);
      updateJson();
    } catch (err) {
      console.warn("インポートエラー:", err);
      showToast("❌ JSONの読み込みに失敗しました", "err");
    }
    importFile.value = "";
  };
  reader.readAsText(file);
}

importFile.addEventListener("change", handleImport);
importFile.addEventListener("input",  handleImport);

// ──────────────────────────────────────
// ② キーボードショートカット
// ──────────────────────────────────────
document.addEventListener("keydown", e => {
  // Ctrl+Enter → 追加 or 更新
  if (e.ctrlKey && !e.shiftKey && e.key === "Enter") {
    e.preventDefault();
    editIdx === -1 ? doAdd() : updateBtn.click();
    return;
  }

  // Ctrl+Shift+C → コピー
  if (e.ctrlKey && e.shiftKey && e.key === "C") {
    e.preventDefault();
    doCopy();
    return;
  }

  // Esc → キャンセル
  if (e.key === "Escape") {
    if (editIdx !== -1) { exitEditMode(); clearForm(); }
    return;
  }

  // ↑↓ → 一覧の選択移動（フォーム外でのみ）
  if (document.activeElement.tagName === "INPUT" ||
      document.activeElement.tagName === "TEXTAREA" ||
      document.activeElement.tagName === "SELECT") return;

  if (e.key === "ArrowDown" && works.length > 0) {
    e.preventDefault();
    const next = Math.min(selectedIdx + 1, works.length - 1);
    enterEditMode(next);
    return;
  }
  if (e.key === "ArrowUp" && works.length > 0) {
    e.preventDefault();
    const prev = Math.max(selectedIdx - 1, 0);
    enterEditMode(prev);
    return;
  }

  // Delete → 選択行を削除
  if (e.key === "Delete" && selectedIdx !== -1) {
    e.preventDefault();
    deleteWork(selectedIdx);
    return;
  }
});

// ② Enter → 次のフィールドへ移動
const FIELD_ORDER = [urlInput, fId, fPrice, fTitle, fMaker, fImage, fTags, fDesc, fCta];
FIELD_ORDER.forEach((el, i) => {
  if (el.tagName === "TEXTAREA") return; // textareaはEnterで改行させる
  el.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.ctrlKey) {
      e.preventDefault();
      const next = FIELD_ORDER[i + 1];
      if (next) next.focus();
    }
  });
});

// 【6】debounce ユーティリティ（IME変換中の過剰保存を防ぐ）
function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// ① worksデータの永続化
function persist() {
  try {
    const json = JSON.stringify(works);
    // ⑥ Blob.size で実バイト数を計測（length は文字数なので多バイト文字でズレる）
    const byteSize = new Blob([json]).size;
    if (byteSize > 4_500_000) {
      showToast("⚠️ データが大きくなっています。Exportで整理してください", "info");
    }
    localStorage.setItem("works_editor_data", json);
  } catch (e) {
    if (e.name === "QuotaExceededError" || e.name === "NS_ERROR_DOM_QUOTA_REACHED") {
      showToast("⚠️ 保存容量が上限です。Exportでデータを整理してください", "err");
    }
    console.warn("localStorage保存失敗 (works):", e);
  }
}

// ① ⑥ 初期読み込み（破損対策：console.warn + 空配列フォールバック）
function loadFromLocal() {
  try {
    const raw = localStorage.getItem("works_editor_data");
    if (!raw) return [];
    const d = JSON.parse(raw);
    if (!Array.isArray(d)) {
      console.warn("works_editor_data が配列ではないため無視します:", d);
      return [];
    }
    return d;
  } catch (e) {
    console.warn("works_editor_data の読み込みに失敗しました:", e);
    return [];
  }
}

// ③ フォーム入力のドラフト保存（【6】debounce 200ms で過剰保存を防ぐ）
const saveDraft = debounce(_saveDraftRaw, 200);
function _saveDraftRaw() {
  try {
    localStorage.setItem("works_editor_draft", JSON.stringify({
      url:      urlInput.value,
      id:       fId.value,
      title:    fTitle.value,
      maker:    fMaker.value,
      price:    fPrice.value,
      image:    fImage.value,
      tags:     fTags.value,
      desc:     fDesc.value,
      cta:      fCta.value,
    }));
  } catch (e) {
    // 【8】Quota 超過は静かに無視（ドラフトは補助機能）
    if (e.name !== "QuotaExceededError" && e.name !== "NS_ERROR_DOM_QUOTA_REACHED") {
      console.warn("draft保存失敗:", e);
    }
  }
}

// ④ ドラフト復元（ページロード時に呼ぶ）
function restoreDraft() {
  try {
    const raw = localStorage.getItem("works_editor_draft");
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (!d || typeof d !== "object") return false;

    // null / undefined のフィールドはスキップ
    if (d.url      != null) urlInput.value   = d.url;
    if (d.id       != null) fId.value        = d.id;
    if (d.title    != null) fTitle.value     = d.title;
    if (d.maker    != null) fMaker.value     = d.maker;
    if (d.price    != null) fPrice.value     = d.price;
    if (d.image    != null) fImage.value     = d.image;
    if (d.tags     != null) fTags.value      = d.tags;
    if (d.desc     != null) fDesc.value      = d.desc;
    if (d.cta      != null) fCta.value       = d.cta;

    // RJヒントを復元
    if (d.id) rjHint.textContent = `✅ ${d.id}`;

    return !!(d.title || d.url); // 何か入力があれば true
  } catch (e) {
    console.warn("draft復元失敗:", e);
    return false;
  }
}

// 【3】confirm() 廃止：Promise ベースのモーダル確認
//   使い方: const ok = await showConfirm("メッセージ");
let _toastTimer;
function showToast(msg, type = "ok") {
  clearTimeout(_toastTimer);
  toast.textContent = msg;
  toast.className   = `toast ${type} show`;
  _toastTimer = setTimeout(() => toast.classList.remove("show"), 2800);
}

function showConfirm(msg, yesLabel = "はい", noLabel = "いいえ") {
  return new Promise(resolve => {
    document.getElementById("modalMsg").textContent = msg;
    document.getElementById("modalYes").textContent = yesLabel;
    document.getElementById("modalNo").textContent  = noLabel;
    const overlay = document.getElementById("modalOverlay");
    overlay.classList.add("show");

    const cleanup = (result) => {
      overlay.classList.remove("show");
      document.getElementById("modalYes").replaceWith(document.getElementById("modalYes").cloneNode(true));
      document.getElementById("modalNo").replaceWith(document.getElementById("modalNo").cloneNode(true));
      resolve(result);
    };

    // 毎回新しいリスナーを設定するためcloneNode後に取り直す
    document.getElementById("modalYes").addEventListener("click", () => cleanup(true),  { once: true });
    document.getElementById("modalNo").addEventListener("click",  () => cleanup(false), { once: true });
    overlay.addEventListener("click", e => { if (e.target === overlay) cleanup(false); }, { once: true });
  });
}

const undoToast = document.getElementById("undoToast");

  undoMsg.textContent = msg;

    undoToast.classList.remove("show");

undoBtn.addEventListener("click", () => {
  if (!_undoBuffer) return;
  // 元の位置に戻す（末尾でなく元のインデックスへ）
  const { work, idx } = _undoBuffer;
  works.splice(Math.min(idx, works.length), 0, work);
  _undoBuffer = null;
  clearTimeout(_undoTimer);
  undoToast.classList.remove("show");
  persist();
  renderTable(true);
  updateJson();
  showToast(`↩「${work.title}」を復元しました`, "ok");
});

function parseTags(str) {
  return [
    ...new Set(
      str.split(/[,、，]+/)
        .map(t => t.trim())
        .filter(Boolean)
        .map(t => TAG_MAP[t.toLowerCase()] ?? TAG_MAP[t] ?? t)
        .filter(t => t !== "") // 禁止タグ（TAG_MAPで""に変換されたもの）を除外
    )
  ];
}

// 【1】XSSエスケープ：innerHTML に埋め込む文字列は必ずこれを通す
function esc(str) {
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 【2】⑦ URLスキーム検証：URL コンストラクタで厳密にパース
//   /^https?:\/\// だけだと "https://evil.com?javascript:" が通るため強化
function safeUrl(url) {
  if (!url) return "";
  try {
    const u = new URL(String(url).trim());
    return ["http:", "https:"].includes(u.protocol) ? u.href : "";
  } catch {
    return ""; // パース失敗（相対URL・不正文字列など）
  }
}

document.getElementById("copyMakerBtn").addEventListener("click", () => {
  if (works.length === 0) { showToast("複製元の作品がありません", "err"); return; }
  const last = works[works.length - 1];
  if (!last.maker) { showToast("前の作品にサークル名がありません", "err"); return; }
  fMaker.value = last.maker;
  saveDraft();
  showToast(`📋 サークル名「${last.maker}」を複製しました`, "ok");
});

document.getElementById("copyTagsBtn").addEventListener("click", () => {
  if (works.length === 0) { showToast("複製元の作品がありません", "err"); return; }
  const last = works[works.length - 1];
  if (!last.tags?.length) { showToast("前の作品にタグがありません", "err"); return; }
  fTags.value = last.tags.join(", ");
  saveDraft();
  syncTagChips();
  // ④ タグ複製後はCTAも自動再生成（新規追加モードのときのみ）
  if (editIdx === -1) {
    isAutoCTA = true;
    setAutoCTA(parseTags(fTags.value));
  }
  updatePreview();
  showToast(`📋 タグを複製しました（${last.tags.join(" / ")}）`, "ok");
});

// ⑧ イベント委譲：tblBodyへのクリックを初期化時に一度だけ登録
//    renderTable のたびに再登録しないのでメモリ効率・保守性が上がる
tblBody.addEventListener("click", e => {
  // ── ホバーボタン（削除・外部リンク） ──────────────
  const actBtn = e.target.closest(".tbl-act-btn");
  if (actBtn) {
    e.stopPropagation();
    const idx = Number(actBtn.dataset.idx);
    if (actBtn.dataset.act === "del") {
      deleteWork(idx);
    } else if (actBtn.dataset.act === "ext") {
      const safe = safeUrl(works[idx]?.url ?? "");
      if (safe) window.open(safe, "_blank", "noopener,noreferrer");
    }
    return;
  }

  // ── 行クリック → 編集モード ────────────────────
  const row = e.target.closest(".tbl-row");
  if (row && !e.target.closest(".tbl-actions")) {
    enterEditMode(Number(row.dataset.idx));
  }
});
